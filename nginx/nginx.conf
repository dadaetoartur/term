events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    upstream term_sp131 {
        server term-sp131:8080;
    }
    
    upstream term_backend {
        server term-backend:5000;
    }

    upstream term_frontend {
        server term-frontend:3000;
    }

    server {
        listen 80;
        server_name bimify.systems;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://term_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /backend/ {
            rewrite ^/backend(/.*)$ $1 break;
            proxy_pass http://term_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Content-Length $http_content_length;
            client_max_body_size 10G;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
        }

        location /sp131/ {
            proxy_pass http://term_sp131/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name bimify.systems;

        ssl_certificate /etc/nginx/certs/bimify.crt;
        ssl_certificate_key /etc/nginx/certs/bimify.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://term_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /backend/ {
            rewrite ^/backend(/.*)$ $1 break;
            proxy_pass http://term_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Content-Length $http_content_length;
            client_max_body_size 10G;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
        }

        location /sp131/ {
            proxy_pass http://term_sp131/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
