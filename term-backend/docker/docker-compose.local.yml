version: "3"

name: term-backend

services:
  term-backend:
    build:
      context: ./../
      dockerfile: ./docker/Dockerfile
    container_name: term-backend
    env_file:
      - ./../.env
    ports:
      - 5000:5000
    healthcheck:
      test: curl --fail http://localhost:5000/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: on-failure
    depends_on:
      minio-local:
        condition: service_healthy
      postgres-local:
        condition: service_healthy

  postgres-local:
    image: postgres:16.2-alpine
    environment:
      PGDATA: /data/postgres
    env_file:
      - ../.env
    container_name: postgres-local
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-local:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: minio-local
    command: server --console-address ":9001" /data/
    env_file:
      - ../.env
    volumes:
      - minio_data:/data/
    ports:
      - 9000:9000
      - 9001:9001
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 5s
      retries: 3
      timeout: 5s
      start_period: 10s

  influxdb-local:
    image: influxdb:2.7-alpine
    container_name: influxdb-local
    ports:
      - 8086:8086
    volumes:
      - influxdb-storage:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=db0
      - INFLUXDB_ADMIN_USER=user
      - INFLUXDB_ADMIN_PASSWORD=password

volumes:
  postgres_data: {}
  influxdb-storage: {}
  minio_data: {}
