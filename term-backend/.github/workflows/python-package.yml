name: Python Application Test

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  lint:
    name: Run ruff and mypy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry 
        python -m poetry export --with lint -f requirements.txt -o requirements.txt
        python -m pip install -r requirements.txt

    - name: Lint with ruff
      run: |
        ruff check --output-format=github .

    - name: Type check with Mypy 
      run: |
        mypy --config-file pyproject.toml service
        
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry 
        python -m poetry export --with test  --with lint -f requirements.txt -o requirements.txt
        python -m pip install -r requirements.txt
        python -m pip install pytest pytest-md pytest-emoji

    - uses: pavelzw/pytest-action@v2
      with:
        emoji: false
        verbose: true
        job-summary: true
