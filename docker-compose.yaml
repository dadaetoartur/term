name: production

services:
  term-backend:
    build:
      context: term-backend
      dockerfile: ./docker/Dockerfile
    container_name: term-backend
    env_file:
      - .env.backend
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: on-failure
    depends_on:
      - postgres-local
      - minio-local
      - influxdb-local

  term-frontend:
    build:
      context: term-frontend
      dockerfile: ./docker/Dockerfile
    container_name: term-frontend
    env_file:
      - .env.frontend
    restart: always

  term-sp131:
    build:
      context: term-sp131
      dockerfile: ./docker/Dockerfile
    container_name: term-sp131
    restart: always

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - term-sp131
      - term-backend
      - term-frontend
    restart: always
    volumes:
      - ./logs:/var/log/nginx
      - ./certs/bimify.crt:/etc/nginx/certs/bimify.crt
      - ./certs/bimify.key:/etc/nginx/certs/bimify.key

  postgres-local:
    image: postgres:16.2-alpine
    container_name: postgres-local
    ports:
      - 5432:5432
    env_file:
      - .env.infra
    volumes:
      - ./.postgres_data:/data/postgres

  minio-local:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: minio-local
    command: server --console-address ":9001" /data/
    env_file:
      - .env.infra
    volumes:
      - ./.minio_data:/data/
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 5s
      retries: 3
      timeout: 5s
      start_period: 10s

  influxdb-local:
    image: influxdb:2.7-alpine
    container_name: influxdb-local
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
      - ./certs/bimify.crt:/etc/ssl/certs/bimify.crt
      - ./certs/bimify.key:/etc/ssl/private/bimify.key
    env_file:
      - .env.infra

volumes:
  influxdb_data: {}
